<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- Bottom book (dusty blue) -->
  <rect x="8" y="100" width="104" height="18" rx="2" fill="#7A8FA6" stroke="#5a6f84" stroke-width="1.2"/>
  <rect x="8" y="100" width="14" height="18" rx="2" fill="#5a6f84"/>
  <text x="30" y="113" font-family="serif" font-size="6" fill="#e8f0f7" letter-spacing="1">FOLKLORE &amp; MEMORY</text>
  <!-- Middle book (terracotta) -->
  <rect x="12" y="78" width="96" height="20" rx="2" fill="#8B4A3A" stroke="#6b3328" stroke-width="1.2"/>
  <rect x="12" y="78" width="13" height="20" rx="2" fill="#6b3328"/>
  <text x="33" y="92" font-family="serif" font-size="6" fill="#faf0e8" letter-spacing="1">SOUTHERN GOTHIC</text>
  <!-- Top book (sage) -->
  <rect x="16" y="58" width="88" height="18" rx="2" fill="#8A9E88" stroke="#6a7e68" stroke-width="1.2"/>
  <rect x="16" y="58" width="12" height="18" rx="2" fill="#6a7e68"/>
  <text x="35" y="71" font-family="serif" font-size="6" fill="#f0f5ef" letter-spacing="1">DIGITAL HUMANITIES</text>
  <!-- Thin book (gold) -->
  <rect x="20" y="48" width="80" height="9" rx="1.5" fill="#C4A265" stroke="#a08040" stroke-width="1"/>
  <!-- Open book on top -->
  <path d="M25 20 Q60 14 95 20 L95 46 Q60 40 25 46 Z" fill="#FAF7F2" stroke="#c4a265" stroke-width="1.2"/>
  <path d="M60 20 L60 46" stroke="#c4a265" stroke-width="0.8"/>
  <!-- Page lines left -->
  <line x1="32" y1="26" x2="56" y2="24" stroke="#c4a265" stroke-width="0.6" opacity="0.6"/>
  <line x1="32" y1="30" x2="56" y2="28" stroke="#c4a265" stroke-width="0.6" opacity="0.6"/>
  <line x1="32" y1="34" x2="56" y2="32" stroke="#c4a265" stroke-width="0.6" opacity="0.6"/>
  <line x1="32" y1="38" x2="56" y2="36" stroke="#c4a265" stroke-width="0.6" opacity="0.6"/>
  <!-- Page lines right -->
  <line x1="64" y1="24" x2="88" y2="26" stroke="#c4a265" stroke-width="0.6" opacity="0.6"/>
  <line x1="64" y1="28" x2="88" y2="30" stroke="#c4a265" stroke-width="0.6" opacity="0.6"/>
  <line x1="64" y1="32" x2="88" y2="34" stroke="#c4a265" stroke-width="0.6" opacity="0.6"/>
  <line x1="64" y1="36" x2="88" y2="38" stroke="#c4a265" stroke-width="0.6" opacity="0.6"/>
  <!-- Bookmark ribbon -->
  <path d="M75 40 L75 56 L78 52 L81 56 L81 40 Z" fill="#8B4A3A" opacity="0.8"/>
</svg>
