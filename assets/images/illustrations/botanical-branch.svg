  <!-- Branch 1 -->
  <path d="M50 63 Q45 50 40 42" stroke="#8A9E88" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- Branch 2 -->
  <path d="M90 45 Q88 32 82 26" stroke="#8A9E88" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- Branch 3 -->
