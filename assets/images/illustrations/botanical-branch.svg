  <ellipse cx="170" cy="22" rx="9" ry="4" fill="#8A9E88" opacity="0.65" transform="rotate(-8 170 22)"/>
  <!-- Branch leaves -->
  <ellipse cx="40" cy="42" rx="7" ry="3.5" fill="#6a7e68" opacity="0.7" transform="rotate(-50 40 42)"/>
  <ellipse cx="82" cy="26" rx="7" ry="3.5" fill="#6a7e68" opacity="0.7" transform="rotate(-40 82 26)"/>
  <ellipse cx="138" cy="14" rx="7" ry="3" fill="#6a7e68" opacity="0.7" transform="rotate(-30 138 14)"/>
