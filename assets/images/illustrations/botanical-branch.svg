  <ellipse cx="35" cy="72" rx="9" ry="5" fill="#8A9E88" opacity="0.75" transform="rotate(-30 35 72)"/>
  <ellipse cx="60" cy="57" rx="10" ry="5" fill="#8A9E88" opacity="0.7" transform="rotate(-20 60 57)"/>
  <ellipse cx="100" cy="42" rx="10" ry="5" fill="#8A9E88" opacity="0.75" transform="rotate(-15 100 42)"/>
