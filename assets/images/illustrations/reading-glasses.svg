<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 60" fill="none">
  <!-- Left arm -->
  <path d="M4 20 L28 28" stroke="#3D3028" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M112 28 L136 20" stroke="#3D3028" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bridge -->
  <path d="M62 30 Q70 26 78 30" stroke="#3D3028" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Left lens frame -->
  <ellipse cx="44" cy="32" rx="18" ry="14" fill="none" stroke="#3D3028" stroke-width="2.5"/>
  <ellipse cx="44" cy="32" rx="18" ry="14" fill="#7A8FA6" opacity="0.12"/>
  <!-- Right lens frame -->
  <ellipse cx="96" cy="32" rx="18" ry="14" fill="none" stroke="#3D3028" stroke-width="2.5"/>
  <ellipse cx="96" cy="32" rx="18" ry="14" fill="#7A8FA6" opacity="0.12"/>
  <!-- Lens shine -->
  <path d="M34 24 Q38 22 40 25" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M86 24 Q90 22 92 25" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
