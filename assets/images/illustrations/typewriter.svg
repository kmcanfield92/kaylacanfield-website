<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- Paper coming out of typewriter -->
  <rect x="52" y="4" width="56" height="36" rx="1" fill="#FAF7F2" stroke="#c4a265" stroke-width="1"/>
  <!-- Paper lines -->
  <line x1="60" y1="12" x2="100" y2="12" stroke="#c4a265" stroke-width="0.7" opacity="0.5"/>
  <line x1="60" y1="17" x2="100" y2="17" stroke="#c4a265" stroke-width="0.7" opacity="0.5"/>
  <line x1="60" y1="22" x2="100" y2="22" stroke="#c4a265" stroke-width="0.7" opacity="0.5"/>
  <line x1="60" y1="27" x2="88" y2="27" stroke="#c4a265" stroke-width="0.7" opacity="0.5"/>
  <!-- Typewriter body -->
  <rect x="14" y="34" width="132" height="68" rx="8" fill="#3D3028" stroke="#2a1f18" stroke-width="1.5"/>
  <!-- Top panel / platen area -->
  <rect x="20" y="34" width="120" height="28" rx="6" fill="#4a3c32" stroke="#2a1f18" stroke-width="1"/>
  <!-- Platen roller -->
  <rect x="30" y="36" width="100" height="12" rx="6" fill="#2a1f18"/>
  <rect x="30" y="38" width="100" height="8" rx="4" fill="#1a1210"/>
  <!-- Platen knobs -->
  <circle cx="30" cy="42" r="5" fill="#3D3028" stroke="#2a1f18" stroke-width="1"/>
  <circle cx="130" cy="42" r="5" fill="#3D3028" stroke="#2a1f18" stroke-width="1"/>
  <!-- Carriage return lever -->
  <rect x="130" y="36" width="16" height="5" rx="2.5" fill="#8B4A3A"/>
  <!-- Keyboard area -->
  <rect x="22" y="66" width="116" height="30" rx="4" fill="#2a1f18"/>
  <!-- Key rows -->
  <!-- Row 1 -->
  <rect x="28" y="70" width="10" height="8" rx="2" fill="#4a3c32" stroke="#5a4c42" stroke-width="0.5"/>
  <rect x="42" y="70" width="10" height="8" rx="2" fill="#4a3c32" stroke="#5a4c42" stroke-width="0.5"/>
  <rect x="56" y="70" width="10" height="8" rx="2" fill="#4a3c32" stroke="#5a4c42" stroke-width="0.5"/>
  <rect x="70" y="70" width="10" height="8" rx="2" fill="#4a3c32" stroke="#5a4c42" stroke-width="0.5"/>
  <rect x="84" y="70" width="10" height="8" rx="2" fill="#4a3c32" stroke="#5a4c42" stroke-width="0.5"/>
  <rect x="98" y="70" width="10" height="8" rx="2" fill="#4a3c32" stroke="#5a4c42" stroke-width="0.5"/>
  <rect x="112" y="70" width="10" height="8" rx="2" fill="#4a3c32" stroke="#5a4c42" stroke-width="0.5"/>
  <rect x="126" y="70" width="10" height="8" rx="2" fill="#4a3c32" stroke="#5a4c42" stroke-width="0.5"/>
  <!-- Row 2 -->
  <rect x="32" y="82" width="10" height="8" rx="2" fill="#4a3c32" stroke="#5a4c42" stroke-width="0.5"/>
  <rect x="46" y="82" width="10" height="8" rx="2" fill="#4a3c32" stroke="#5a4c42" stroke-width="0.5"/>
  <rect x="60" y="82" width="10" height="8" rx="2" fill="#4a3c32" stroke="#5a4c42" stroke-width="0.5"/>
  <rect x="74" y="82" width="10" height="8" rx="2" fill="#4a3c32" stroke="#5a4c42" stroke-width="0.5"/>
  <rect x="88" y="82" width="10" height="8" rx="2" fill="#4a3c32" stroke="#5a4c42" stroke-width="0.5"/>
  <rect x="102" y="82" width="10" height="8" rx="2" fill="#4a3c32" stroke="#5a4c42" stroke-width="0.5"/>
  <rect x="116" y="82" width="10" height="8" rx="2" fill="#4a3c32" stroke="#5a4c42" stroke-width="0.5"/>
  <!-- Key labels (tiny) -->
  <text x="33" y="77" font-family="monospace" font-size="4" fill="#c4a265" opacity="0.8">Q</text>
  <text x="47" y="77" font-family="monospace" font-size="4" fill="#c4a265" opacity="0.8">W</text>
  <text x="61" y="77" font-family="monospace" font-size="4" fill="#c4a265" opacity="0.8">E</text>
  <text x="75" y="77" font-family="monospace" font-size="4" fill="#c4a265" opacity="0.8">R</text>
  <text x="89" y="77" font-family="monospace" font-size="4" fill="#c4a265" opacity="0.8">T</text>
  <text x="103" y="77" font-family="monospace" font-size="4" fill="#c4a265" opacity="0.8">Y</text>
  <!-- Typebars -->
  <path d="M78 60 L80 52" stroke="#c4a265" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M82 60 L84 50" stroke="#c4a265" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M86 60 L83 50" stroke="#c4a265" stroke-width="1.5" stroke-linecap="round"/>
</svg>
